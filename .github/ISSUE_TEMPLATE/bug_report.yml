name: Bug Report
description: Report a bug with SwornTweaks
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: SwornTweaks Version
      description: Which version are you using? (e.g. v1.8.0)
      placeholder: v1.8.0
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of SwornTweaks is affected?
      options:
        - In-game mod (DLL)
        - Configurator (GUI app)
        - Both
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open the configurator
        2. Change setting X to Y
        3. Launch the game
        4. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: Paste any relevant log output or error messages here. This will be automatically formatted as code.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, config files, or anything else that might help.
