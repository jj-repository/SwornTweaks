name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for SwornTweaks? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement you have in mind.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why?
      description: How would this improve your experience with the mod?

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, examples, or anything else that might help.
