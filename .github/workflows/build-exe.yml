name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller certifi

      - name: Build executable
        run: >
          pyinstaller --onefile --windowed
          --name SwornTweaks
          --hidden-import certifi
          --collect-data certifi
          configurator.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SwornTweaks
          path: dist/SwornTweaks.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0

      - name: Install Python dependencies
        run: pip install PyQt6 pyinstaller certifi

      - name: Build executable
        run: >
          pyinstaller --onefile --windowed
          --name SwornTweaks-Linux
          --hidden-import certifi
          --collect-data certifi
          configurator.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SwornTweaks-Linux
          path: dist/SwornTweaks-Linux

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: SwornTweaks
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: SwornTweaks-Linux
          path: release/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/SwornTweaks.exe
            release/SwornTweaks-Linux
            SwornTweaks.dll
