name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --windowed --name SwornTweaks-Configurator configurator.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwornTweaks-Configurator
          path: dist/SwornTweaks-Configurator.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SwornTweaks-Configurator.exe
