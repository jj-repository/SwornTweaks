name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller==6.13.0 certifi

      - name: Update version_info.txt from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          MAJOR="${VER%%.*}"
          MINOR="${VER##*.}"
          sed -i "s/filevers=([^)]*)/filevers=($MAJOR, $MINOR, 0, 0)/" version_info.txt
          sed -i "s/prodvers=([^)]*)/prodvers=($MAJOR, $MINOR, 0, 0)/" version_info.txt
          sed -i "s/u'FileVersion', u'[^']*'/u'FileVersion', u'$VER.0.0'/" version_info.txt
          sed -i "s/u'ProductVersion', u'[^']*'/u'ProductVersion', u'$VER.0.0'/" version_info.txt

      - name: Build executable
        run: >
          pyinstaller --onefile --windowed
          --name SwornTweaks
          --hidden-import certifi
          --collect-data certifi
          --version-file version_info.txt
          configurator.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SwornTweaks
          path: dist/SwornTweaks.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0

      - name: Install Python dependencies
        run: pip install PyQt6 pyinstaller==6.13.0 certifi

      - name: Build executable
        run: >
          pyinstaller --onefile --windowed
          --name SwornTweaks-Linux
          --hidden-import certifi
          --collect-data certifi
          configurator.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SwornTweaks-Linux
          path: dist/SwornTweaks-Linux

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: SwornTweaks
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: SwornTweaks-Linux
          path: release/

      - name: Generate SHA256SUMS
        run: |
          sha256sum release/SwornTweaks.exe release/SwornTweaks-Linux SwornTweaks.dll configurator.py > SHA256SUMS
          # Strip directory prefixes so asset names match what the updater expects
          sed -i 's|release/||g' SHA256SUMS

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            release/SwornTweaks.exe \
            release/SwornTweaks-Linux \
            SwornTweaks.dll \
            SHA256SUMS \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepend download disclaimer to release notes
        run: |
          TAG="${{ github.ref_name }}"
          DISCLAIMER=$'## 📥 Downloads\n\n**For the configurator app:**\n- **Windows** → `SwornTweaks.exe`\n- **Linux** → `SwornTweaks-Linux`\n\n**For the game mod (always required):**\n- `SwornTweaks.dll` — drop into your MelonLoader `Mods/` folder\n\nThe `SHA256SUMS` file is an optional checksum for verifying the download — you don\'t need it to use the mod.\n\n---\n\n'
          BODY=$(gh release view "$TAG" --json body -q .body)
          printf '%s%s' "$DISCLAIMER" "$BODY" > /tmp/release_notes.md
          gh release edit "$TAG" --notes-file /tmp/release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
